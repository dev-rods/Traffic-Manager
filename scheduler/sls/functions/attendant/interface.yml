AttendantControl:
  handler: src.functions.attendant.handler.handler
  memorySize: 512
  timeout: 30
  iamRoleStatementsName: ${self:service}-${self:custom.stage}-AttendantControl-lambdaRole
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:GetItem
        - dynamodb:PutItem
      Resource:
        - "arn:aws:dynamodb:${self:provider.region}:${self:custom.accountId}:table/${self:custom.resourcePrefix}-conversation-sessions"
    - Effect: Allow
      Action:
        - ssm:GetParameter
      Resource:
        - "arn:aws:ssm:${self:provider.region}:*:parameter/${self:custom.stage}/*"
    - Effect: Allow
      Action:
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "arn:aws:logs:*:*:*"
  events:
    - http:
        path: attendant/activate
        method: post
        cors: true
    - http:
        path: attendant/deactivate
        method: post
        cors: true
    - http:
        path: attendant/status
        method: get
        cors: true

AttendantPanel:
  handler: src.functions.attendant.panel.handler
  memorySize: 256
  timeout: 10
  iamRoleStatementsName: ${self:service}-${self:custom.stage}-AttendantPanel-lambdaRole
  iamRoleStatements:
    - Effect: Allow
      Action:
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "arn:aws:logs:*:*:*"
  events:
    - http:
        path: attendant/panel
        method: get
        cors: true
